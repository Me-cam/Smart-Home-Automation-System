    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 15px; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card:hover { transform: translateY(-5px); }
        
        /* Status Colors */
        .status-on { color: #2ecc71; font-weight: bold; }
        .status-off { color: #e74c3c; font-weight: bold; }
        .alert-active { background-color: #ffeded; border: 1px solid #ff4d4d; animation: pulse 2s infinite; }
        
        /* Fan Animation */
        .fan-icon { transition: transform 0.5s; }
        .spinning { animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .sensor-value { font-size: 1.5rem; font-weight: bold; color: #57a2ee; }
        .header-bg { background: linear-gradient(135deg, #93f3ce 0%, #2d83da 100%); color: rgb(155, 119, 119); padding: 20px 0; border-radius: 0 0 25px 25px; margin-bottom: 30px; }


.navbar {
    padding: 1rem 0;
}

.stat-card {
    border-radius: 15px;
    background: #ffffff;
}

.device-card {
    border-radius: 18px;
    transition: transform 0.2s ease;
}

.device-card:active {
    transform: scale(0.98);
}

.icon-box {
    width: 45px;
    height: 45px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
}

/* Custom Switch Styling */
.form-check-input {
    width: 2.5em;
    height: 1.25em;
    cursor: pointer;
}

/* Mobile adjustments */
@media (max-width: 576px) {
    header h2 {
        font-size: 1.5rem;
    }
}
nav{
    background-color: #a4cde6;
}

main {
  min-height: 100vh;
  background-image: url(smart-home.webp);
  background-size: cover;
  background-position: center;
}
.boxContainer{
    background-color: #a4cde6;
}

    <main class="py-5">
      <section class="py-5 ">
        <div class="container ">
          <div
            id="loginBox"
            class="boxContainer text-center p-3 p-md-5  rounded-2"
          >
            <h1 class="my-5">Smart Login System</h1>
            <div class="inputsForm ">
              <input
                type="email"
                id="loginEmail"
                class="form-control"
                placeholder="Enter your email"
                required
              />
              <input
                type="password"
                id="loginPassword"
                class="form-control mt-3"
                placeholder="Enter your password"

              <button id="loginBtn" class="btn btn-main my-4 w-100">
                Log in
              </button>
              <div class="signupText d-flex justify-content-center gap-2 mt-1">

<script>
    
    function toggleFan() {
        const isChecked = document.getElementById('fanSwitch').checked;
        const icon = document.getElementById('fan-icon');
        const text = document.getElementById('fan-text');
        
        if(isChecked) {
            icon.classList.add('spinning', 'text-primary');
            text.innerText = "Status: High Speed";
        } else {
            icon.classList.remove('spinning', 'text-primary');
            text.innerText = "Status: Off";
        }
    }

    function toggleAC() {
        const isChecked = document.getElementById('acSwitch').checked;
        document.getElementById('ac-text').innerText = isChecked ? "Status: AC NOT CONNECTED" : "Status: Off";
    }

    function toggleLights(btn) {
        const icon = document.getElementById('lamp-icon');
        if(btn.checked) {
            icon.classList.add('text-warning');
            document.getElementById('lamp-text').innerText = "Status: On";
        } else {
            icon.classList.remove('text-warning');
            document.getElementById('lamp-text').innerText = "Status: Off";
        }
    }

    function ringBell() {
        alert("Ding Dong! Doorbell activated.");
    }

    // Simulate Sensor Data Updates
    setInterval(() => {
        // Random Temp/Humidity
        //document.getElementById('temp-val').innerText = (22 + Math.random() * 3).toFixed(1);
        //document.getElementById('hum-val').innerText = (40 + Math.random() * 10).toFixed(0);
        
        // Random Motion Trigger (10% chance)
        if(Math.random() > 0.9) {
            document.getElementById('motion-alert').classList.remove('d-none');
            setTimeout(() => {
                document.getElementById('motion-alert').classList.add('d-none');
            }, 3000);
        }
    }, 5000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
